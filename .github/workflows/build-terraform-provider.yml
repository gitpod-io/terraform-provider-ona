name: Terraform provider CI
run-name: "${{ inputs.release_channel != 'none' && format('Create Terraform provider {0} release', inputs.release_channel) || 'Build Terraform provider' }}"

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel to publish"
        required: false
        type: choice
        options:
          - none
          - stable
          - beta
        default: none
      release_environment:
        description: "GitHub environment that contains release credentials"
        required: false
        type: string
        default: main
  workflow_call:
    inputs:
      release_channel:
        description: "Release channel to publish: none, stable, or beta"
        required: false
        type: string
        default: none
      release_environment:
        description: "GitHub environment that contains release credentials"
        required: false
        type: string
        default: ""
    outputs:
      version:
        description: Published release version, including the leading v.
        value: ${{ jobs.resolve-release-version.outputs.version }}
      version_no_v:
        description: Published release version without the leading v.
        value: ${{ jobs.resolve-release-version.outputs.version_no_v }}

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.11.4
  RELEASE_REPOSITORY: gitpod-io/terraform-provider-ona
  REGISTRY_PROVIDER_SOURCE: gitpod-io/ona
  REGISTRY_TIMEOUT_MINUTES: "60"
  TERRAFORM_VERSION: 1.15.8

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: Test and build provider
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate stable release metadata
        run: scripts/validate-release-version.sh --channel stable --no-tag-precedence

      - name: Validate beta release metadata
        run: scripts/validate-release-version.sh --channel beta --no-tag-precedence

      - name: Read Go version
        id: go_version
        uses: ./.github/actions/read-go-version

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ steps.go_version.outputs.version }}
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install golangci-lint
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail

          mkdir -p "$GOBIN"
          go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
          echo "$GOBIN" >> "$GITHUB_PATH"

      - name: Download dependencies
        run: make install-dependencies

      - name: Check formatting
        run: make fmt

      - name: Verify formatting
        run: git diff --exit-code

      - name: Generate provider docs
        run: make generate

      - name: Verify generated files are current
        run: git diff --exit-code

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Build provider
        run: make build

  release-snapshot:
    name: Build release snapshot
    needs: [verify]
    if: ${{ inputs.release_channel == 'none' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read Go version
        id: go_version
        uses: ./.github/actions/read-go-version

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ steps.go_version.outputs.version }}
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Build snapshot release artifacts
        run: make release-snapshot RELEASE_SNAPSHOT_VERSION=0.0.0-SNAPSHOT

  resolve-release-version:
    name: Select release version
    if: ${{ inputs.release_channel != 'none' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_no_v: ${{ steps.version.outputs.version_no_v }}
    steps:
      - name: Require main branch for publishing
        env:
          REF_NAME: ${{ github.ref }}
        run: |
          set -euo pipefail

          if [[ "$REF_NAME" != "refs/heads/main" ]]; then
            echo "::error::Release publishing must run from main after the release-prep PR merges, got ${REF_NAME}."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
        run: scripts/validate-release-version.sh --channel "$RELEASE_CHANNEL" --github-output

  publish-preflight:
    name: Check release prerequisites
    needs: [resolve-release-version]
    if: ${{ inputs.release_channel != 'none' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.release_environment }}
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      GPG_FINGERPRINT: ${{ secrets.TERRAFORM_PROVIDER_ONA_GPG_FINGERPRINT }}
      GPG_PRIVATE_KEY: ${{ secrets.TERRAFORM_PROVIDER_ONA_GPG_PRIVATE_KEY }}
      RELEASE_REPOSITORY: gitpod-io/terraform-provider-ona
      RELEASE_CHANNEL: ${{ inputs.release_channel }}
      VERSION: ${{ needs.resolve-release-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate publish inputs and external prerequisites
        run: scripts/preflight-publish-release.sh

  create-release:
    name: Create GitHub release
    needs: [verify, resolve-release-version, publish-preflight]
    if: ${{ inputs.release_channel != 'none' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.release_environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Read Go version
        id: go_version
        uses: ./.github/actions/read-go-version

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.GITPOD_NEXT_APP_ID }}
          private-key: ${{ secrets.GITPOD_NEXT_APP_PRIVATE_KEY }}
          repositories: terraform-provider-ona

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ steps.go_version.outputs.version }}
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          GPG_FINGERPRINT: ${{ secrets.TERRAFORM_PROVIDER_ONA_GPG_FINGERPRINT }}
          GPG_PASSPHRASE: ${{ secrets.TERRAFORM_PROVIDER_ONA_GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY: ${{ secrets.TERRAFORM_PROVIDER_ONA_GPG_PRIVATE_KEY }}
          RELEASE_REPOSITORY: gitpod-io/terraform-provider-ona
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
          VERSION: ${{ needs.resolve-release-version.outputs.version }}
        run: scripts/publish-release.sh

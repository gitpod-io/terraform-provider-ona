name: Terraform provider CI
run-name: "${{ inputs.publish_release && 'Create Terraform provider release' || 'Build Terraform provider' }}"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      publish_release:
        description: "Publish a prerelease to GitHub releases"
        required: false
        type: boolean
        default: false
      version:
        description: "Optional prerelease version, for example v0.1.0-beta.1. Defaults to v0.1.0-beta.<run number> when publishing."
        required: false
        type: string
        default: ""
      release_environment:
        description: "GitHub environment that contains release credentials"
        required: false
        type: string
        default: ""
    outputs:
      version:
        description: Published release version, including the leading v.
        value: ${{ jobs.resolve-prerelease-version.outputs.version }}
      version_no_v:
        description: Published release version without the leading v.
        value: ${{ jobs.resolve-prerelease-version.outputs.version_no_v }}

permissions:
  contents: read

env:
  DEFAULT_PRERELEASE_PREFIX: v0.1.0-beta
  GOLANGCI_LINT_VERSION: v2.11.4
  RELEASE_REPOSITORY: gitpod-io/terraform-provider-ona
  REGISTRY_PROVIDER_SOURCE: gitpod-io/ona
  REGISTRY_TIMEOUT_MINUTES: "60"
  TERRAFORM_VERSION: 1.15.8

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: Test and build provider
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read Go version
        id: go_version
        uses: ./.github/actions/read-go-version

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ steps.go_version.outputs.version }}
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install golangci-lint
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail

          mkdir -p "$GOBIN"
          go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
          echo "$GOBIN" >> "$GITHUB_PATH"

      - name: Download dependencies
        run: make install-dependencies

      - name: Check formatting
        run: make fmt

      - name: Verify formatting
        run: git diff --exit-code

      - name: Generate provider docs
        run: make generate

      - name: Verify generated files are current
        run: git diff --exit-code

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Build provider
        run: make build

  release-snapshot:
    name: Build release snapshot
    needs: [verify]
    if: ${{ !inputs.publish_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read Go version
        id: go_version
        uses: ./.github/actions/read-go-version

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ steps.go_version.outputs.version }}
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Build snapshot release artifacts
        run: make release-snapshot RELEASE_SNAPSHOT_VERSION=0.0.0-SNAPSHOT

  resolve-prerelease-version:
    name: Select release version
    if: ${{ inputs.publish_release }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_no_v: ${{ steps.version.outputs.version_no_v }}
    steps:
      - name: Resolve version
        id: version
        env:
          DEFAULT_PRERELEASE_PREFIX: ${{ env.DEFAULT_PRERELEASE_PREFIX }}
          INPUT_VERSION: ${{ inputs.version || '' }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION//[[:space:]]/}"
          if [[ -z "$version" ]]; then
            version="${DEFAULT_PRERELEASE_PREFIX}.${RUN_NUMBER}"
          fi
          [[ "$version" == v* ]] || version="v${version}"

          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z][0-9A-Za-z.-]*$ ]]; then
            echo "::error::Version must be a prerelease semver such as v0.1.0-beta.1, got: ${version}"
            exit 1
          fi

          echo "version=${version}" >>"$GITHUB_OUTPUT"
          echo "version_no_v=${version#v}" >>"$GITHUB_OUTPUT"
          echo "Resolved prerelease version: ${version}"

  publish-preflight:
    name: Check release prerequisites
    needs: [resolve-prerelease-version]
    if: ${{ inputs.publish_release }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.release_environment }}
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      GPG_FINGERPRINT: ${{ secrets.TERRAFORM_PROVIDER_ONA_GPG_FINGERPRINT }}
      GPG_PRIVATE_KEY: ${{ secrets.TERRAFORM_PROVIDER_ONA_GPG_PRIVATE_KEY }}
      RELEASE_REPOSITORY: gitpod-io/terraform-provider-ona
      VERSION: ${{ needs.resolve-prerelease-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate publish inputs and external prerequisites
        run: scripts/preflight-publish-release.sh

  create-release:
    name: Create GitHub release
    needs: [verify, resolve-prerelease-version, publish-preflight]
    if: ${{ inputs.publish_release }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.release_environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read Go version
        id: go_version
        uses: ./.github/actions/read-go-version

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.GITPOD_NEXT_APP_ID }}
          private-key: ${{ secrets.GITPOD_NEXT_APP_PRIVATE_KEY }}
          repositories: terraform-provider-ona

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ steps.go_version.outputs.version }}
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          GPG_FINGERPRINT: ${{ secrets.TERRAFORM_PROVIDER_ONA_GPG_FINGERPRINT }}
          GPG_PASSPHRASE: ${{ secrets.TERRAFORM_PROVIDER_ONA_GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY: ${{ secrets.TERRAFORM_PROVIDER_ONA_GPG_PRIVATE_KEY }}
          RELEASE_REPOSITORY: gitpod-io/terraform-provider-ona
          VERSION: ${{ needs.resolve-prerelease-version.outputs.version }}
        run: scripts/publish-release.sh

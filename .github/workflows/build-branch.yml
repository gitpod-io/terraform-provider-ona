name: Build branch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

env:
  TERRAFORM_VERSION: 1.15.8

defaults:
  run:
    shell: bash

jobs:
  test-and-build:
    name: Test and build provider
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Download dependencies
        run: |
          set -euo pipefail
          go mod download
          (cd tools && GOWORK=off go mod download)

      - name: Check formatting
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "::error::Go files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Generate provider docs
        run: make generate

      - name: Verify generated files are current
        run: git diff --exit-code

      - name: Run lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Run tests
        run: make test

      - name: Build provider
        run: make build

  release-snapshot:
    name: Build release snapshot
    needs: [test-and-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Build snapshot release artifacts
        run: make release-snapshot RELEASE_SNAPSHOT_VERSION=0.0.0-SNAPSHOT

# Verify that a published provider version can be installed by Terraform.
name: Registry Init Check

on:
  workflow_dispatch:
    inputs:
      source:
        description: Terraform provider source address
        required: true
        default: gitpod-io/ona
      version:
        description: Provider version without the leading v
        required: true
      timeout_minutes:
        description: Maximum minutes to wait for registry availability
        required: true
        default: '60'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  wait-for-registry:
    name: Wait for Terraform Registry
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.registry.outputs.source }}
      version: ${{ steps.registry.outputs.version }}
      timeout_minutes: ${{ steps.registry.outputs.timeout_minutes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Wait for provider version
        id: registry
        env:
          SOURCE: ${{ inputs.source }}
          VERSION: ${{ inputs.version }}
          TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
        run: scripts/wait-for-registry-provider.sh

  init-check:
    name: Terraform init (${{ matrix.runner }})
    needs: wait-for-registry
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
    steps:
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false
      - name: Write Terraform config
        env:
          SOURCE: ${{ needs.wait-for-registry.outputs.source }}
          VERSION: ${{ needs.wait-for-registry.outputs.version }}
        run: |
          cat > main.tf <<EOF
          terraform {
            required_providers {
              ona = {
                source  = "${SOURCE}"
                version = "= ${VERSION}"
              }
            }
          }

          provider "ona" {}
          EOF
      - name: Initialize provider
        env:
          TIMEOUT_MINUTES: ${{ needs.wait-for-registry.outputs.timeout_minutes }}
        run: |
          set +e
          deadline=$((SECONDS + TIMEOUT_MINUTES * 60))

          while true; do
            terraform init -upgrade -no-color
            status=$?

            if [[ $status -eq 0 ]]; then
              exit 0
            fi

            if ((SECONDS >= deadline)); then
              echo "Timed out waiting for terraform init to succeed."
              exit "$status"
            fi

            rm -rf .terraform .terraform.lock.hcl
            sleep 60
          done

name: Build main

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a prerelease to GitHub releases. Pushes to main always publish."
        required: false
        type: boolean
        default: false
      version:
        description: "Optional prerelease version, for example v0.1.0-beta.1. Defaults to v0.1.0-beta.<run number> when publishing."
        required: false
        type: string
        default: ""
  push:
    branches:
      - main

jobs:
  terraform-provider-ci:
    uses: ./.github/workflows/build-terraform-provider.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      publish_release: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release) }}
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}

  trigger-registry-verification:
    name: Start Registry verification
    needs: [terraform-provider-ci]
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release) }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      REGISTRY_PROVIDER_SOURCE: gitpod-io/ona
      REGISTRY_TIMEOUT_MINUTES: "60"
    steps:
      - name: Start Registry verification workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REGISTRY_WORKFLOW: registry-init-check.yml
          SOURCE: ${{ env.REGISTRY_PROVIDER_SOURCE }}
          VERSION: ${{ needs['terraform-provider-ci'].outputs.version_no_v }}
          TIMEOUT_MINUTES: ${{ env.REGISTRY_TIMEOUT_MINUTES }}
        run: |
          set -euo pipefail

          gh workflow run "$REGISTRY_WORKFLOW" \
            --ref "$REF_NAME" \
            --field source="$SOURCE" \
            --field version="$VERSION" \
            --field timeout_minutes="$TIMEOUT_MINUTES"

          echo "Started Terraform Registry verification for ${SOURCE} ${VERSION}."

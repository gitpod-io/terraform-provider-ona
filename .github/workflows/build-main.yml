name: Build main

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel to publish. Pushes to main publish beta automatically."
        required: false
        type: choice
        options:
          - none
          - stable
        default: none
  push:
    branches:
      - main

concurrency:
  group: ${{ github.event_name == 'push' && 'terraform-provider-release' || (inputs.release_channel == 'stable' && 'terraform-provider-release' || format('terraform-provider-ci-{0}', github.run_id)) }}
  cancel-in-progress: false

jobs:
  build-terraform-provider:
    name: Terraform provider CI
    uses: ./.github/workflows/build-terraform-provider.yml
    permissions:
      contents: read
    secrets: inherit
    with:
      release_channel: ${{ github.event_name == 'push' && 'beta' || inputs.release_channel }}
      release_environment: ${{ github.event_name == 'push' && 'beta' || 'main' }}

  trigger-registry-verification:
    name: Start Registry verification
    needs: [build-terraform-provider]
    if: ${{ github.event_name == 'push' || inputs.release_channel == 'stable' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      REGISTRY_PROVIDER_SOURCE: gitpod-io/ona
      REGISTRY_TIMEOUT_MINUTES: "60"
    steps:
      - name: Start Registry verification workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          REGISTRY_WORKFLOW: registry-init-check.yml
          SOURCE: ${{ env.REGISTRY_PROVIDER_SOURCE }}
          VERSION: ${{ needs['build-terraform-provider'].outputs.version_no_v }}
          TIMEOUT_MINUTES: ${{ env.REGISTRY_TIMEOUT_MINUTES }}
        run: |
          set -euo pipefail

          gh workflow run "$REGISTRY_WORKFLOW" \
            --repo "$REPOSITORY" \
            --ref "$REF_NAME" \
            --field source="$SOURCE" \
            --field version="$VERSION" \
            --field timeout_minutes="$TIMEOUT_MINUTES"

          echo "Started Terraform Registry verification for ${SOURCE} ${VERSION}."

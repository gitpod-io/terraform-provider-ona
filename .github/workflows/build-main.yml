name: Build main

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish the provider version declared in VERSION to GitHub releases."
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main

jobs:
  build-terraform-provider:
    name: Terraform provider CI
    uses: ./.github/workflows/build-terraform-provider.yml
    permissions:
      contents: read
    secrets: inherit
    with:
      release_environment: main
      publish_release: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}

  trigger-registry-verification:
    name: Start Registry verification
    needs: [build-terraform-provider]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      REGISTRY_PROVIDER_SOURCE: gitpod-io/ona
      REGISTRY_TIMEOUT_MINUTES: "60"
    steps:
      - name: Start Registry verification workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          REGISTRY_WORKFLOW: registry-init-check.yml
          SOURCE: ${{ env.REGISTRY_PROVIDER_SOURCE }}
          VERSION: ${{ needs['build-terraform-provider'].outputs.version_no_v }}
          TIMEOUT_MINUTES: ${{ env.REGISTRY_TIMEOUT_MINUTES }}
        run: |
          set -euo pipefail

          gh workflow run "$REGISTRY_WORKFLOW" \
            --repo "$REPOSITORY" \
            --ref "$REF_NAME" \
            --field source="$SOURCE" \
            --field version="$VERSION" \
            --field timeout_minutes="$TIMEOUT_MINUTES"

          echo "Started Terraform Registry verification for ${SOURCE} ${VERSION}."

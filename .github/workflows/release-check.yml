# Validate release packaging before a semver tag is pushed.
name: Release Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  goreleaser:
    name: GoReleaser snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          args: check
      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          args: release --snapshot --clean --skip=publish,sign
      - name: Verify Terraform Registry artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob

          archives=(dist/terraform-provider-ona_*.zip)
          checksums=(dist/terraform-provider-ona_*_SHA256SUMS)

          if [[ ${#archives[@]} -eq 0 ]]; then
            echo "No provider archives were produced."
            exit 1
          fi

          if [[ ${#archives[@]} -ne 2 ]]; then
            echo "Expected Linux amd64 and Linux arm64 archives, found ${#archives[@]} archives."
            printf '%s\n' "${archives[@]}"
            exit 1
          fi

          for required in linux_amd64 linux_arm64; do
            if ! printf '%s\n' "${archives[@]}" | grep -q "_${required}.zip$"; then
              echo "Missing required ${required} provider archive."
              exit 1
            fi
          done

          if [[ ${#checksums[@]} -ne 1 ]]; then
            echo "Expected exactly one SHA256SUMS file, found ${#checksums[@]}."
            exit 1
          fi

          if [[ ! -s terraform-registry-manifest.json ]]; then
            echo "terraform-registry-manifest.json is missing."
            exit 1
          fi

          if ! grep -q ' terraform-provider-ona_.*_manifest\.json$' "${checksums[0]}"; then
            echo "The checksum file does not include the Terraform Registry manifest."
            exit 1
          fi

          for archive in "${archives[@]}"; do
            if ! unzip -l "$archive" | grep -q 'terraform-provider-ona_v'; then
              echo "Archive $archive does not contain the provider binary."
              exit 1
            fi
          done
